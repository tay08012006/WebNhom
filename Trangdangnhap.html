<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning | Đăng nhập hệ thống</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Tông màu nền xanh biển nhạt dịu mắt */
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Khung đăng nhập chính */
        .login-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 119, 204, 0.15);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-area h2 {
            color: #0277bd; /* Xanh đậm cho tiêu đề */
            font-weight: 800;
            font-size: 28px;
        }

        .logo-area p {
            color: #546e7a;
            font-size: 15px;
            margin-top: 5px;
        }

        /* Nút chọn vai trò (Tabs) */
        .role-tabs {
            display: flex;
            background: #f1f8e9;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .role-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-weight: 700;
            color: #78909c;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .role-tab.active {
            background: #0288d1;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(2, 136, 209, 0.3);
        }

        /* Form nhập liệu */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #37474f;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e1f5fe;
            border-radius: 10px;
            font-size: 15px;
            color: #263238;
            transition: all 0.3s ease;
            outline: none;
            background: #fcfcfc;
        }

        .input-group input:focus {
            border-color: #03a9f4;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(3, 169, 244, 0.1);
        }

        /* Nút Submit */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #0288d1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #0277bd;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Quên mật khẩu */
        .extra-links {
            text-align: center;
            margin-top: 20px;
        }

        .extra-links a {
            color: #0288d1;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="logo-area">
            <h2>E-Learning</h2>
            <p id="welcome-text">Chào mừng bạn quay trở lại lớp học!</p>
        </div>

        <div class="role-tabs">
            <div class="role-tab active" id="tab-student" onclick="switchRole('student')">Học sinh</div>
            <div class="role-tab" id="tab-teacher" onclick="switchRole('teacher')">Giáo viên</div>
        </div>

        <form action="login_process.php" method="POST">
            <div class="input-group">
                <label for="email">Địa chỉ Email</label>
                <input type="email" id="email" name="email" required placeholder="Ví dụ: student@test.com">
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu của bạn">
            </div>

            <button type="submit" class="btn-submit" id="btn-login">Đăng nhập với tư cách Học sinh</button>
        </form>

        <div class="extra-links">
            <a href="#">Bạn quên mật khẩu?</a>
        </div>
    </div>

    <script>
        function switchRole(role) {
            const tabStudent = document.getElementById('tab-student');
            const tabTeacher = document.getElementById('tab-teacher');
            const emailInput = document.getElementById('email');
            const btnLogin = document.getElementById('btn-login');
            const welcomeText = document.getElementById('welcome-text');

            if (role === 'student') {
                // Đổi giao diện sang Học sinh
                tabStudent.classList.add('active');
                tabTeacher.classList.remove('active');
                emailInput.placeholder = "Ví dụ: student@test.com";
                btnLogin.innerText = "Đăng nhập với tư cách Học sinh";
                welcomeText.innerText = "Chào mừng bạn quay trở lại lớp học!";
            } else {
                // Đổi giao diện sang Giáo viên
                tabTeacher.classList.add('active');
                tabStudent.classList.remove('active');
                emailInput.placeholder = "Ví dụ: teacher@test.com";
                btnLogin.innerText = "Vào phòng làm việc Giáo viên";
                welcomeText.innerText = "Kính chào Thầy/Cô giáo!";
            }
        }
    </script>
</body>
</html>
